version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pikado-db
    environment:
      POSTGRES_DB: pikado
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pikado_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pikado-api
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pikado
      JWT_SECRET: pikado-super-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      CORS_ORIGINS: http://localhost:3000
      NODE_ENV: production
    ports:
      - '3001:3001'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pikado-web
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - '3000:3000'
    restart: unless-stopped

volumes:
  pikado_pgdata:
